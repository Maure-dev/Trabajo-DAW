<section class="w-full h-[calc(100vh-7.5rem)] overflow-y-auto">
    <div class="bg-warning py-2 px-12 mt-8 flex justify-between items-center">
        <span class="font-semibold text-white text-3xl">Administración</span>
        <button routerLink="/"
            class="flex font-semibold text-error hover:brightness-90 cursor-pointer bg-white rounded shadow-lg">
            <span class="text-xl flex items-center bg-error/20 py-2 px-4">Salir</span>
        </button>
    </div>
    <div class="flex flex-col items-center shadow-lg border-2 border-primary bg-primary/40 py-4 px-4 rounded m-8">
        <div class="flex items-center justify-start w-full mb-12">
            <span class="text-nowrap mr-4 font-semibold">
                Ingresá el link para administrar la encuesta publicada:
            </span>
            <input type="text" name="link" id="link"
                class="bg-white w-full shadow-lg border-2 border-primary rounded-lg pl-4 py-2 placeholder:text-disabled placeholder:brightness-60 font-semibold text-xl mr-4" />
            <button [disabled]="true"
                class="flex text-nowrap items-center w-fit bg-confirm hover:brightness-90 px-4 py-3 rounded text-white shadow-lg cursor-pointer disabled:border disabled:border-disabled disabled:bg-white/60 disabled:text-disabled disabled:brightness-60 disabled:cursor-not-allowed">
                <i class="material-symbols-outlined mr-2 text-xl">edit</i>
                Acceder
            </button>
        </div>
        <span class="w-full text-primary font-bold text-2xl mb-4">Encuestas guardadas como borrador</span>
        <div class="bg-white w-full shadow-lg border-2 border-primary rounded-lg p-8 grid grid-cols-4 gap-4">
            <div class="bg-warning/60 rounded-xl p-4 min-h-96">
                <div class="flex flex-col justify-between items-center bg-white rounded-lg p-4 h-full">
                    <h1 class="font-semibold text-2xl">Encuesta 1</h1>
                    <i class="material-symbols-outlined !text-7xl text-warning">edit_document</i>
                    <button
                        class="flex items-end w-fit bg-primary hover:brightness-90 px-4 py-2 rounded text-white shadow-lg cursor-pointer">
                        <i class="material-symbols-outlined mr-2 text-xl">edit</i>
                        Editar encuesta
                    </button>
                </div>

            </div>
        </div>
    </div>
    <span></span>
</section>
